services:
  nextjs:
    build:
      context: .
      dockerfile: docker/Dockerfile.nextjs
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://pokemon_user:pokemon_pass@postgres:5432/pokemon_db
      - NEXT_PUBLIC_POKEAPI_URL=https://pokeapi.co/api/v2
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: pokemon_user
      POSTGRES_PASSWORD: pokemon_pass
      POSTGRES_DB: pokemon_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokemon_user -d pokemon_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
